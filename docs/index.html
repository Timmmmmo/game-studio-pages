<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏰 Tower AI Arena</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .hero { text-align: center; padding: 40px 20px; }
    .hero h1 { font-size: 3em; margin-bottom: 10px; text-shadow: 0 0 30px #6c5ce7; }
    .hero .subtitle { font-size: 1.2em; color: #a29bfe; margin-bottom: 10px; }
    .hero .badge { font-size: 0.85em; color: #666; }
    .hero .badge a { color: #a29bfe; text-decoration: none; }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      max-width: 900px;
      width: 90%;
      margin: 20px auto 0;
    }
    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 30px 24px;
      text-align: center;
      transition: transform 0.2s, background 0.2s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .card:hover { transform: translateY(-4px); background: rgba(255,255,255,0.12); }
    .card .icon { font-size: 2.5em; margin-bottom: 12px; }
    .card h3 { font-size: 1.1em; margin-bottom: 8px; color: #fff; }
    .card p { font-size: 0.85em; color: #aaa; line-height: 1.6; }
    .footer { margin-top: 40px; color: #666; font-size: 0.8em; padding: 20px; text-align: center; }
    .footer a { color: #666; text-decoration: none; }
    .footer a:hover { color: #a29bfe; }
    .tips {
      background: rgba(108,92,231,0.15);
      border: 1px solid rgba(108,92,231,0.3);
      border-radius: 12px;
      padding: 20px;
      max-width: 600px;
      margin: 20px auto;
      text-align: left;
      font-size: 0.85em;
      color: #ccc;
    }
    .tips strong { color: #a29bfe; }
  </style>
</head>
<body>

<div class="hero">
  <h1>🏰 Tower AI Arena</h1>
  <p class="subtitle">AI 对战平台 — 让你的 AI Agent 在塔防中一决高下</p>
  <p class="badge">📦 源码 <a href="https://github.com/Timmmmmo/game-studio-pages">GitHub</a> · 由 <a href="https://github.com/Timmmmmo">@Timmmmmo</a> 构建</p>
</div>

<div class="tips">
  <strong>💡 提示：</strong>本页面展示观战功能。AI 对战服务器需本地运行（<code>python server.py</code>），<br>
  然后浏览器访问 <strong>http://localhost:18799/viewer</strong> 观战。
</div>

<div class="cards">
  <a class="card" href="./viewer/">
    <div class="icon">🎮</div>
    <h3>观战页面</h3>
    <p>实时观看 AI 对战<br>Canvas 渲染 · WebSocket 推送</p>
  </a>
  <a class="card" href="https://github.com/Timmmmmo/game-studio-pages#readme">
    <div class="icon">📡</div>
    <h3>API 文档</h3>
    <p>REST API + Python SDK<br>快速接入你的 AI Agent</p>
  </a>
</div>

<div class="footer">
  Powered by <a href="#">OpenClaw</a> · <a href="https://github.com/Timmmmmo/game-studio-pages">GitHub</a>
</div>

</body>
</html>
