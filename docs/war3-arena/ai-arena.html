<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🤖 AI Arena - AI对战平台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', 'PingFang SC', sans-serif; background: linear-gradient(135deg, #0a0a1a, #1a1a3e); color: #e0e0e0; min-height: 100vh; padding: 20px; }
    .container { max-width: 1100px; margin: 0 auto; }
    h1 { text-align: center; font-size: 2.5rem; background: linear-gradient(90deg, #f39c12, #e74c3c, #9b59b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
    .subtitle { text-align: center; color: #888; margin-bottom: 24px; font-size: 1.1rem; }
    .bot-select { display: flex; gap: 20px; margin-bottom: 20px; }
    .bot-panel { flex: 1; background: rgba(255,255,255,0.05); border: 2px solid; border-radius: 12px; padding: 16px; }
    .bot-panel.blue { border-color: #3498db; }
    .bot-panel.red { border-color: #e74c3c; }
    .bot-panel h3 { margin-bottom: 12px; font-size: 1.2rem; }
    .bot-panel select { width: 100%; padding: 8px; margin-bottom: 8px; background: rgba(0,0,0,0.4); border: 1px solid #444; border-radius: 6px; color: #e0e0e0; font-size: 0.95rem; }
    .bot-panel select option { background: #1a1a2e; }
    .controls { text-align: center; margin-bottom: 20px; }
    .btn { padding: 12px 40px; font-size: 1.1rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
    .btn-start { background: linear-gradient(135deg, #2ecc71, #27ae60); color: white; }
    .btn-start:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(46,204,113,0.4); }
    .btn-reset { background: rgba(255,255,255,0.1); color: #aaa; margin-left: 12px; }
    .btn-reset:hover { background: rgba(255,255,255,0.2); }
    .battle-stats { display: flex; justify-content: space-around; margin-bottom: 16px; gap: 16px; }
    .stat-box { flex: 1; background: rgba(255,255,255,0.05); border-radius: 10px; padding: 12px 16px; text-align: center; }
    .stat-box.blue { border-left: 4px solid #3498db; }
    .stat-box.red { border-left: 4px solid #e74c3c; }
    .stat-box.gold { border-left: 4px solid #f39c12; }
    .stat-label { font-size: 0.8rem; color: #888; text-transform: uppercase; }
    .stat-value { font-size: 1.8rem; font-weight: bold; margin-top: 4px; }
    .stat-box.blue .stat-value { color: #3498db; }
    .stat-box.red .stat-value { color: #e74c3c; }
    .stat-box.gold .stat-value { color: #f39c12; }
    .hp-bars { display: flex; gap: 16px; margin-bottom: 16px; }
    .hp-bar-wrap { flex: 1; }
    .hp-label { font-size: 0.85rem; color: #888; margin-bottom: 4px; }
    .hp-bar-bg { height: 24px; background: rgba(0,0,0,0.5); border-radius: 12px; overflow: hidden; position: relative; }
    .hp-bar-fill { height: 100%; transition: width 0.3s; border-radius: 12px; }
    .hp-bar-fill.blue { background: linear-gradient(90deg, #2980b9, #3498db); }
    .hp-bar-fill.red { background: linear-gradient(90deg, #c0392b, #e74c3c); }
    .hp-bar-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 0.8rem; font-weight: bold; color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
    .battle-log { background: rgba(0,0,0,0.6); border: 1px solid #333; border-radius: 10px; padding: 12px; height: 320px; overflow-y: auto; font-family: 'Consolas', 'Courier New', monospace; font-size: 0.85rem; line-height: 1.6; }
    .log-entry { padding: 3px 6px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .log-entry.turn { background: rgba(243,156,18,0.15); color: #f39c12; font-weight: bold; }
    .log-entry.kill { color: #e74c3c; }
    .log-entry.heal { color: #2ecc71; }
    .log-entry.skill { color: #9b59b6; }
    .log-entry.siege { color: #e67e22; }
    .log-entry.crit { color: #f1c40f; font-weight: bold; }
    .log-entry.prod-blue { color: #3498db; }
    .log-entry.prod-red { color: #e74c3c; }
    .log-entry.system { color: #888; font-style: italic; }
    .log-entry.winner { color: #2ecc71; font-size: 1.1rem; font-weight: bold; text-align: center; background: rgba(46,204,113,0.1); }
    .army-view { display: flex; gap: 16px; margin-bottom: 16px; }
    .army-panel { flex: 1; background: rgba(255,255,255,0.03); border-radius: 10px; padding: 10px; max-height: 140px; overflow-y: auto; }
    .army-panel.blue { border-top: 3px solid #3498db; }
    .army-panel.red { border-top: 3px solid #e74c3c; }
    .army-label { font-size: 0.8rem; color: #888; margin-bottom: 6px; }
    .unit-list { display: flex; flex-wrap: wrap; gap: 4px; }
    .unit-tag { display: inline-flex; align-items: center; gap: 2px; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; background: rgba(255,255,255,0.1); }
    .unit-tag.hero { border: 1px solid #f39c12; background: rgba(243,156,18,0.2); }
    .unit-tag.dead { opacity: 0.4; text-decoration: line-through; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🤖 AI Arena</h1>
    <p class="subtitle">AI对战平台 · 观看两个AI智能对战</p>
    <div class="bot-select">
      <div class="bot-panel blue">
        <h3>🔵 蓝方 AI</h3>
        <select id="blue-personality">
          <option value="aggressive">激进型 (Aggressive)</option>
          <option value="balanced" selected>均衡型 (Balanced)</option>
          <option value="defensive">防守型 (Defensive)</option>
          <option value="economic">经济型 (Economic)</option>
        </select>
        <select id="blue-difficulty">
          <option value="easy">简单 (Easy)</option>
          <option value="normal" selected>普通 (Normal)</option>
          <option value="hard">困难 (Hard)</option>
        </select>
      </div>
      <div class="bot-panel red">
        <h3>🔴 红方 AI</h3>
        <select id="red-personality">
          <option value="aggressive" selected>激进型 (Aggressive)</option>
          <option value="balanced">均衡型 (Balanced)</option>
          <option value="defensive">防守型 (Defensive)</option>
          <option value="economic">经济型 (Economic)</option>
        </select>
        <select id="red-difficulty">
          <option value="easy">简单 (Easy)</option>
          <option value="normal" selected>普通 (Normal)</option>
          <option value="hard">困难 (Hard)</option>
        </select>
      </div>
    </div>
    <div class="controls">
      <button class="btn btn-start" onclick="startBattle()">▶️ 开始对战</button>
      <button class="btn btn-reset" onclick="resetBattle()">🔄 重置</button>
    </div>
    <div class="battle-stats">
      <div class="stat-box blue"><div class="stat-label">蓝方单位</div><div class="stat-value" id="blue-count">0</div></div>
      <div class="stat-box gold"><div class="stat-label">回合数</div><div class="stat-value" id="turn-count">0</div></div>
      <div class="stat-box red"><div class="stat-label">红方单位</div><div class="stat-value" id="red-count">0</div></div>
    </div>
    <div class="hp-bars">
      <div class="hp-bar-wrap">
        <div class="hp-label">🔵 蓝方基地</div>
        <div class="hp-bar-bg">
          <div class="hp-bar-fill blue" id="blue-hp-bar" style="width:100%"></div>
          <span class="hp-bar-text" id="blue-hp-text">3000 / 3000</span>
        </div>
      </div>
      <div class="hp-bar-wrap">
        <div class="hp-label">🔴 红方基地</div>
        <div class="hp-bar-bg">
          <div class="hp-bar-fill red" id="red-hp-bar" style="width:100%"></div>
          <span class="hp-bar-text" id="red-hp-text">3000 / 3000</span>
        </div>
      </div>
    </div>
    <div class="army-view">
      <div class="army-panel blue">
        <div class="army-label">🔵 蓝方军队</div>
        <div class="unit-list" id="blue-army"></div>
      </div>
      <div class="army-panel red">
        <div class="army-label">🔴 红方军队</div>
        <div class="unit-list" id="red-army"></div>
      </div>
    </div>
    <div class="battle-log" id="battle-log">
      <div class="log-entry system">✨ 选择AI难度和性格，点击"开始对战"观看精彩对决！</div>
    </div>
  </div>
  <script src="game.js"></script>
  <script>
    let game = null;
    let intervalId = null;
    function log(msg, type = '') {
      const logEl = document.getElementById('battle-log');
      const entry = document.createElement('div');
      entry.className = 'log-entry ' + type;
      entry.textContent = msg;
      logEl.appendChild(entry);
      logEl.scrollTop = logEl.scrollHeight;
    }
    function updateUI() {
      if (!game) return;
      const blueAlive = game.blueArmy.filter(u => !u.dead).length;
      const redAlive = game.redBrain ? game.redBrain.army.filter(u => !u.dead).length : 0;
      document.getElementById('blue-count').textContent = blueAlive;
      document.getElementById('red-count').textContent = redAlive;
      document.getElementById('turn-count').textContent = game.turn;
      const bluePct = Math.max(0, (game.blueBase.hp / game.blueBase.maxHp) * 100);
      const redPct = Math.max(0, (game.redBase.hp / game.redBase.maxHp) * 100);
      document.getElementById('blue-hp-bar').style.width = bluePct + '%';
      document.getElementById('red-hp-bar').style.width = redPct + '%';
      document.getElementById('blue-hp-text').textContent = game.blueBase.hp + ' / ' + game.blueBase.maxHp;
      document.getElementById('red-hp-text').textContent = game.redBase.hp + ' / ' + game.redBase.maxHp;
      updateArmyList('blue-army', game.blueArmy, 'blue');
      updateArmyList('red-army', game.redBrain ? game.redBrain.army : [], 'red');
    }
    function updateArmyList(elId, army, team) {
      const el = document.getElementById(elId);
      el.innerHTML = '';
      for (const u of army) {
        const tag = document.createElement('span');
        tag.className = 'unit-tag' + (u.isHero ? ' hero' : '') + (u.dead ? ' dead' : '');
        tag.textContent = u.icon + ' ' + u.name + (u.isHero ? ' ⭐' : '');
        if (u.isHero && u.level) tag.textContent += ' Lv' + u.level;
        if (u.hp && u.max_hp) tag.textContent += ' ' + Math.round(u.hp) + ' HP';
        el.appendChild(tag);
      }
    }
    function startBattle() {
      if (intervalId) clearInterval(intervalId);
      const bluePers = document.getElementById('blue-personality').value;
      const blueDiff = document.getElementById('blue-difficulty').value;
      const redPers = document.getElementById('red-personality').value;
      const redDiff = document.getElementById('red-difficulty').value;
      document.getElementById('battle-log').innerHTML = '';
      log('🎮 对战开始！', 'system');
      log('🔵 蓝方: ' + getPersonalityName(bluePers) + ' / ' + getDifficultyName(blueDiff), 'system');
      log('🔴 红方: ' + getPersonalityName(redPers) + ' / ' + getDifficultyName(redDiff), 'system');
      log('─'.repeat(40), 'system');
      game = new Game('spectate', blueDiff);
      if (game.redBrain) {
        game.redBrain.personality = redPers;
        game.redBrain.difficulty = redDiff;
        game.redBrain.diffParams = game.redBrain._diffParams(redDiff);
      }
      game.on('gameOver', (winner) => {
        const wname = winner === 'blue' ? '🔵 蓝方 AI' : '🔴 红方 AI';
        log('', 'system');
        log('═'.repeat(40), 'system');
        log('🏆 游戏结束！胜利者: ' + wname, 'winner');
        log('═'.repeat(40), 'system');
      });
      const origEmit = game.emit.bind(game);
      game.emit = function(event, data) {
        if (event === 'combatResolved' && Array.isArray(data)) {
          for (const entry of data) {
            if (entry.type === 'attack') log(entry.attackerIcon + ' ' + entry.attacker + ' -> ' + entry.targetIcon + ' ' + entry.target + ' 伤害' + entry.damage, '');
            else if (entry.type === 'kill') log('💀 ' + entry.killerIcon + ' ' + entry.killer + ' 击杀 ' + entry.victimIcon + ' ' + entry.victim, 'kill');
            else if (entry.type === 'skill') log('✨ ' + entry.unitIcon + ' ' + entry.unit + ' 使用 ' + entry.skill, 'skill');
            else if (entry.type === 'heal') log('💚 ' + entry.unitIcon + ' ' + entry.unit + ' 治疗 ' + entry.target + ' +' + entry.heal, 'heal');
            else if (entry.type === 'aoe') log('💥 ' + entry.unitIcon + ' ' + entry.unit + ' 使用 ' + entry.skill + ' 群体攻击', 'skill');
            else if (entry.type === 'siege') log('🏰 ' + entry.unitIcon + ' ' + entry.unit + ' 围攻基地 -' + entry.damage, 'siege');
            else if (entry.type === 'crit') log('⚡ ' + entry.attackerIcon + ' ' + entry.attacker + ' 暴击! ' + entry.damage + '伤害', 'crit');
          }
        }
        origEmit(event, data);
      };
      game.on('unitProduced', ({ type, unit, team: t }) => {
        const icon = t === 'blue' ? '🔵' : '🔴';
        log(icon + ' 出兵: ' + unit.icon + ' ' + unit.name, t === 'blue' ? 'prod-blue' : 'prod-red');
      });
      intervalId = setInterval(() => {
        if (game.gameOver) { clearInterval(intervalId); intervalId = null; return; }
        game.spectateTick();
        log('⚔️ 第 ' + game.turn + ' 回合', 'turn');
        updateUI();
      }, 600);
    }
    function resetBattle() {
      if (intervalId) clearInterval(intervalId);
      intervalId = null;
      game = null;
      document.getElementById('battle-log').innerHTML = '<div class="log-entry system">✨ 已重置。选择AI难度和性格，点击"开始对战"观看精彩对决！</div>';
      document.getElementById('blue-count').textContent = '0';
      document.getElementById('red-count').textContent = '0';
      document.getElementById('turn-count').textContent = '0';
      document.getElementById('blue-hp-bar').style.width = '100%';
      document.getElementById('red-hp-bar').style.width = '100%';
      document.getElementById('blue-hp-text').textContent = '3000 / 3000';
      document.getElementById('red-hp-text').textContent = '3000 / 3000';
      document.getElementById('blue-army').innerHTML = '';
      document.getElementById('red-army').innerHTML = '';
    }
    function getPersonalityName(p) { const map = { aggressive: '激进型', balanced: '均衡型', defensive: '防守型', economic: '经济型' }; return map[p] || p; }
    function getDifficultyName(d) { const map = { easy: '简单', normal: '普通', hard: '困难' }; return map[d] || d; }
  </script>
</body>
</html>
