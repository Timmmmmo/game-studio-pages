<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚔️ 魔兽兵种对战 V2 - 基地攻防版</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      color: #fff;
      overflow-x: hidden;
    }

    /* === 头部 === */
    .header {
      text-align: center;
      padding: 15px;
      background: rgba(0,0,0,0.4);
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .header h1 {
      font-size: 1.8rem;
      background: linear-gradient(90deg, #f39c12, #e74c3c, #9b59b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header .subtitle { color: #888; font-size: 0.85rem; margin-top: 4px; }

    /* === 资源条 === */
    .resource-bar {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 10px;
      background: rgba(0,0,0,0.3);
      flex-wrap: wrap;
    }
    .resource-panel {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
    }
    .resource-panel.blue { border: 1px solid rgba(52,152,219,0.3); }
    .resource-panel.red { border: 1px solid rgba(231,76,60,0.3); }
    .resource-icon { font-size: 1.3rem; }
    .resource-info { text-align: left; }
    .resource-value { font-size: 1.1rem; font-weight: bold; }
    .resource-income { font-size: 0.7rem; color: #27ae60; }
    .resource-label { font-size: 0.7rem; color: #888; }
    .blue .resource-value { color: #3498db; }
    .red .resource-value { color: #e74c3c; }

    /* === 基地血量条 === */
    .base-bar {
      display: flex;
      justify-content: center;
      gap: 30px;
      padding: 8px 10px;
      background: rgba(0,0,0,0.25);
      flex-wrap: wrap;
    }
    .base-panel {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      min-width: 280px;
    }
    .base-panel.blue { border: 1px solid rgba(52,152,219,0.2); }
    .base-panel.red { border: 1px solid rgba(231,76,60,0.2); }
    .base-icon { font-size: 1.8rem; }
    .base-info { flex: 1; }
    .base-name { font-size: 0.85rem; font-weight: bold; }
    .blue .base-name { color: #3498db; }
    .red .base-name { color: #e74c3c; }
    .base-hp-bar {
      height: 12px;
      background: rgba(255,255,255,0.1);
      border-radius: 6px;
      overflow: hidden;
      margin-top: 4px;
    }
    .base-hp-fill {
      height: 100%;
      border-radius: 6px;
      transition: width 0.5s ease-out;
    }
    .base-hp-fill.blue-fill { background: linear-gradient(90deg, #2980b9, #3498db); }
    .base-hp-fill.red-fill { background: linear-gradient(90deg, #c0392b, #e74c3c); }
    .base-hp-fill.critical { background: linear-gradient(90deg, #e74c3c, #f39c12); animation: basePulse 1s infinite; }
    .base-hp-text { font-size: 0.7rem; color: #aaa; margin-top: 2px; }
    .base-armor { font-size: 0.65rem; color: #888; }
    @keyframes basePulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* === 科技面板 === */
    .tech-panel {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 8px;
      background: rgba(0,0,0,0.2);
      flex-wrap: wrap;
    }
    .tech-badge {
      padding: 4px 10px;
      background: rgba(155,89,182,0.2);
      border: 1px solid rgba(155,89,182,0.4);
      border-radius: 6px;
      font-size: 0.75rem;
      color: #9b59b6;
    }
    .tech-badge.active {
      background: rgba(155,89,182,0.4);
      color: #fff;
    }

    /* === 控制区 === */
    .controls {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .btn {
      padding: 8px 18px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-primary { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; }
    .btn-green { background: linear-gradient(135deg, #27ae60, #1e8449); color: white; }
    .btn-blue { background: linear-gradient(135deg, #3498db, #2980b9); color: white; }
    .btn-purple { background: linear-gradient(135deg, #9b59b6, #8e44ad); color: white; }
    .btn-yellow { background: linear-gradient(135deg, #f39c12, #d68910); color: white; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: #aaa; }
    .btn-small { padding: 5px 12px; font-size: 0.8rem; }

    .speed-control {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #aaa;
      font-size: 0.85rem;
      background: rgba(255,255,255,0.05);
      padding: 6px 12px;
      border-radius: 8px;
    }
    .speed-control input { width: 70px; accent-color: #9b59b6; }

    /* === 收入计时器 === */
    .income-timer {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #f39c12;
      font-size: 0.85rem;
      background: rgba(243,156,18,0.1);
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid rgba(243,156,18,0.2);
    }
    .income-timer .timer-bar {
      width: 60px;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
    }
    .income-timer .timer-fill {
      height: 100%;
      background: #f39c12;
      border-radius: 3px;
      transition: width 0.1s linear;
    }

    /* === 统计条 === */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 30px;
      padding: 8px;
      background: rgba(0,0,0,0.2);
    }
    .stat-item { text-align: center; }
    .stat-value { font-size: 1.4rem; font-weight: bold; color: #f39c12; }
    .stat-label { font-size: 0.7rem; color: #666; }

    /* === 战斗舞台 === */
    .battle-stage {
      position: relative;
      max-width: 1100px;
      margin: 10px auto;
      padding: 0 20px;
    }

    .arena-row {
      display: flex;
      gap: 15px;
    }

    .army-panel {
      flex: 1;
      min-width: 320px;
      background: rgba(255,255,255,0.03);
      border-radius: 16px;
      padding: 14px;
      position: relative;
    }
    .army-panel.blue { border: 1px solid rgba(52,152,219,0.2); }
    .army-panel.red { border: 1px solid rgba(231,76,60,0.2); }

    .army-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .army-title { font-size: 1rem; font-weight: bold; }
    .blue .army-title { color: #3498db; }
    .red .army-title { color: #e74c3c; }
    .army-power { font-size: 0.8rem; color: #f39c12; }

    /* === 单位卡片 === */
    .unit-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
      margin-bottom: 6px;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .unit-card.attacking {
      animation: attackPulse 0.3s ease-out;
      box-shadow: 0 0 15px rgba(243,156,18,0.5);
    }
    .unit-card.hit {
      animation: hitShake 0.3s ease-out;
    }
    .unit-card.dead {
      opacity: 0.4;
      filter: grayscale(1);
    }
    .unit-card.skill-active {
      box-shadow: 0 0 20px rgba(155,89,182,0.6);
    }
    .unit-card.new-unit {
      animation: newUnitGlow 0.8s ease-out;
    }

    @keyframes attackPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    @keyframes hitShake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    @keyframes newUnitGlow {
      0% { box-shadow: 0 0 20px rgba(39,174,96,0.8); }
      100% { box-shadow: none; }
    }

    .unit-icon {
      font-size: 1.5rem;
      width: 40px;
      text-align: center;
      text-shadow: 0 0 10px rgba(255,255,255,0.3);
    }
    .unit-info { flex: 1; min-width: 0; }
    .unit-name-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .unit-name { font-weight: bold; font-size: 0.9rem; }
    .unit-tier { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; }
    .tier-1 { background: rgba(149,165,166,0.3); color: #95a5a6; }
    .tier-2 { background: rgba(52,152,219,0.3); color: #3498db; }
    .tier-3 { background: rgba(243,156,18,0.3); color: #f39c12; }

    .unit-types { font-size: 0.7rem; color: #666; margin-top: 2px; }
    .hp-container { margin-top: 4px; }
    .hp-bar {
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
    }
    .hp-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s;
    }
    .hp-text { font-size: 0.7rem; color: #888; margin-top: 2px; }

    .mana-bar {
      height: 3px;
      background: rgba(155,89,182,0.2);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 2px;
    }
    .mana-fill {
      height: 100%;
      background: #9b59b6;
      border-radius: 2px;
      transition: width 0.3s;
    }

    .unit-stats {
      text-align: right;
      min-width: 50px;
    }
    .unit-dmg { font-size: 0.85rem; font-weight: bold; color: #e74c3c; }
    .unit-armor { font-size: 0.7rem; color: #3498db; }

    .skill-indicators {
      display: flex;
      gap: 3px;
      margin-top: 4px;
    }
    .skill-icon {
      font-size: 0.75rem;
      opacity: 0.7;
    }
    .skill-icon.on-cooldown { opacity: 0.3; }

    /* === 战斗动画层 === */
    .animation-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1000;
    }

    .damage-number {
      position: absolute;
      font-size: 1.2rem;
      font-weight: bold;
      animation: damageFloat 1s ease-out forwards;
      text-shadow: 0 0 5px rgba(0,0,0,0.8);
      z-index: 1001;
    }
    .damage-number.crit {
      font-size: 1.5rem;
      color: #f39c12;
      animation: critFloat 1s ease-out forwards;
    }
    .damage-number.heal {
      color: #27ae60;
    }
    .damage-number.evade {
      color: #95a5a6;
      font-size: 1rem;
    }
    .damage-number.base-damage {
      font-size: 1.4rem;
      color: #e74c3c;
      text-shadow: 0 0 10px rgba(231,76,60,0.8);
      animation: baseDamageFloat 1.2s ease-out forwards;
    }

    @keyframes damageFloat {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-40px) scale(0.8); opacity: 0; }
    }
    @keyframes critFloat {
      0% { transform: translateY(0) scale(1.3); opacity: 1; }
      50% { transform: translateY(-20px) scale(1.5); opacity: 1; }
      100% { transform: translateY(-50px) scale(1); opacity: 0; }
    }
    @keyframes baseDamageFloat {
      0% { transform: translateY(0) scale(1.2); opacity: 1; }
      30% { transform: translateY(-10px) scale(1.5); opacity: 1; }
      100% { transform: translateY(-50px) scale(0.8); opacity: 0; }
    }

    .skill-effect {
      position: absolute;
      pointer-events: none;
      animation: skillEffect 0.8s ease-out forwards;
    }

    @keyframes skillEffect {
      0% { transform: scale(0.5); opacity: 0; }
      50% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1.5); opacity: 0; }
    }

    /* === 战斗日志 === */
    .log-section {
      max-width: 1100px;
      margin: 10px auto 20px;
      padding: 0 20px;
    }
    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .log-title { color: #f39c12; font-weight: bold; font-size: 0.9rem; }
    .log-filters { display: flex; gap: 6px; }

    .log-box {
      background: rgba(0,0,0,0.4);
      border-radius: 12px;
      padding: 12px;
      max-height: 200px;
      overflow-y: auto;
      font-size: 0.8rem;
      line-height: 1.8;
    }
    .log-round {
      color: #555;
      margin: 4px 0;
      font-size: 0.75rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding-bottom: 2px;
    }
    .log-entry { padding: 1px 0; }
    .log-blue { color: #5dade2; }
    .log-red { color: #e57373; }
    .log-skill { color: #9b59b6; }
    .log-crit { color: #f39c12; font-weight: bold; }
    .log-kill { color: #e74c3c; font-weight: bold; }
    .log-heal { color: #27ae60; }
    .log-evade { color: #95a5a6; font-style: italic; }
    .log-income { color: #f39c12; }
    .log-base { color: #e74c3c; font-weight: bold; }
    .log-spawn { color: #27ae60; }
    .log-tech { color: #9b59b6; }

    /* === 结果横幅 === */
    .result-banner {
      text-align: center;
      padding: 20px;
      font-size: 1.5rem;
      font-weight: bold;
      display: none;
      margin: 10px auto;
      max-width: 500px;
      border-radius: 16px;
      animation: resultPop 0.5s ease-out;
    }
    @keyframes resultPop {
      0% { transform: scale(0.8); opacity: 0; }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }
    .result-blue { color: #3498db; background: rgba(52,152,219,0.15); border: 1px solid rgba(52,152,219,0.4); }
    .result-red { color: #e74c3c; background: rgba(231,76,60,0.15); border: 1px solid rgba(231,76,60,0.4); }

    /* === 相克表弹窗 === */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }
    .modal-content {
      background: #1a1a2e;
      border-radius: 16px;
      padding: 20px;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    .modal-title { font-size: 1.2rem; color: #f39c12; }
    .modal-close {
      background: none;
      border: none;
      color: #888;
      font-size: 1.5rem;
      cursor: pointer;
    }

    .counter-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    .counter-table th, .counter-table td {
      padding: 8px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .counter-table th { background: rgba(255,255,255,0.05); color: #f39c12; }
    .counter-table td.positive { color: #27ae60; }
    .counter-table td.negative { color: #e74c3c; }
    .counter-table td.neutral { color: #888; }

    /* === 响应式 === */
    @media (max-width: 700px) {
      .arena-row { flex-direction: column; }
      .army-panel { min-width: auto; }
      .resource-bar { gap: 10px; }
      .resource-panel { padding: 6px 10px; }
      .base-bar { gap: 10px; }
      .base-panel { min-width: auto; }
      .controls { gap: 5px; }
      .btn { padding: 6px 12px; font-size: 0.85rem; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>⚔️ 魔兽兵种对战 V2</h1>
  <p class="subtitle">基地攻防 · 实时收入 · 科技升级 · AI策略</p>
</div>

<!-- 资源条 -->
<div class="resource-bar">
  <div class="resource-panel blue">
    <span class="resource-icon">💰</span>
    <div class="resource-info">
      <div class="resource-value" id="blueGold">500</div>
      <div class="resource-income">+<span id="blueGoldIncome">40</span>/2秒</div>
    </div>
    <div class="resource-info">
      <div class="resource-value" id="blueLumber">500</div>
      <div class="resource-income">+<span id="blueLumberIncome">20</span>/2秒</div>
    </div>
    <div class="resource-label">🔵 蓝方资源</div>
  </div>
  <div class="resource-panel red">
    <span class="resource-icon">💰</span>
    <div class="resource-info">
      <div class="resource-value" id="redGold">500</div>
      <div class="resource-income">+<span id="redGoldIncome">40</span>/2秒</div>
    </div>
    <div class="resource-info">
      <div class="resource-value" id="redLumber">500</div>
      <div class="resource-income">+<span id="redLumberIncome">20</span>/2秒</div>
    </div>
    <div class="resource-label">🔴 红方资源</div>
  </div>
</div>

<!-- 基地血量条 -->
<div class="base-bar">
  <div class="base-panel blue">
    <div class="base-icon">🏰</div>
    <div class="base-info">
      <div class="base-name">🔵 蓝方基地</div>
      <div class="base-hp-bar">
        <div class="base-hp-fill blue-fill" id="blueBaseHpFill" style="width:100%"></div>
      </div>
      <div class="base-hp-text"><span id="blueBaseHp">3000</span>/3000 <span class="base-armor">🛡️城甲20</span></div>
    </div>
  </div>
  <div class="base-panel red">
    <div class="base-icon">🏰</div>
    <div class="base-info">
      <div class="base-name">🔴 红方基地</div>
      <div class="base-hp-bar">
        <div class="base-hp-fill red-fill" id="redBaseHpFill" style="width:100%"></div>
      </div>
      <div class="base-hp-text"><span id="redBaseHp">3000</span>/3000 <span class="base-armor">🛡️城甲20</span></div>
    </div>
  </div>
</div>

<!-- 科技面板 -->
<div class="tech-panel">
  <div id="blueTechs" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
  <div style="color:#555;margin:0 10px;">|</div>
  <div id="redTechs" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
</div>

<!-- 控制区 -->
<div class="controls">
  <button class="btn btn-primary" id="btnBattle" onclick="startBattle()">⚔️ 开始对战</button>
  <button class="btn btn-green" onclick="startTournament()">🏆 锦标赛</button>
  <button class="btn btn-purple" onclick="showTechTree()">🔬 科技树</button>
  <button class="btn btn-secondary" onclick="showCounterModal()">📋 相克表</button>
  <div class="speed-control">
    <label>⚡</label>
    <input type="range" min="50" max="800" value="300" id="speedSlider" oninput="updateSpeed()">
  </div>
  <div class="income-timer">
    <span>⏱️</span>
    <div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:0%"></div></div>
    <span id="timerText">5秒</span>
  </div>
</div>

<!-- 统计条 -->
<div class="stats-bar">
  <div class="stat-item"><div class="stat-value" id="roundNum">0</div><div class="stat-label">回合</div></div>
  <div class="stat-item"><div class="stat-value" id="blueAlive">0</div><div class="stat-label">蓝方存活</div></div>
  <div class="stat-item"><div class="stat-value" id="redAlive">0</div><div class="stat-label">红方存活</div></div>
  <div class="stat-item"><div class="stat-value" id="actionCount">0</div><div class="stat-label">行动数</div></div>
</div>

<!-- 结果横幅 -->
<div class="result-banner" id="resultBanner"></div>

<!-- 战斗舞台 -->
<div class="battle-stage">
  <div class="arena-row">
    <div class="army-panel blue">
      <div class="army-header">
        <div class="army-title" id="blueTitle">🔵 蓝方</div>
        <div class="army-power" id="bluePower">战力: 0</div>
      </div>
      <div id="blueArmy"></div>
    </div>
    <div class="army-panel red">
      <div class="army-header">
        <div class="army-title" id="redTitle">🔴 红方</div>
        <div class="army-power" id="redPower">战力: 0</div>
      </div>
      <div id="redArmy"></div>
    </div>
  </div>
</div>

<!-- 战斗日志 -->
<div class="log-section">
  <div class="log-header">
    <div class="log-title">📜 战斗记录</div>
  </div>
  <div class="log-box" id="battleLog"></div>
</div>

<!-- 动画层 -->
<div class="animation-layer" id="animationLayer"></div>

<!-- 相克表弹窗 -->
<div class="modal-overlay" id="counterModal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title">📋 伤害相克表</div>
      <button class="modal-close" onclick="closeCounterModal()">×</button>
    </div>
    <div id="counterTableContent"></div>
  </div>
</div>

<!-- 科技树弹窗 -->
<div class="modal-overlay" id="techModal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title">🔬 科技树</div>
      <button class="modal-close" onclick="closeTechModal()">×</button>
    </div>
    <div id="techTreeContent"></div>
  </div>
</div>

<script src="war3_data_v2.js?v=2.4.0-20260510"></script>
<script>
// ==================== 游戏状态 ====================
let gameSpeed = 300;
let battleRunning = false;
let blueBrain = null;
let redBrain = null;
let roundNum = 0;
let actionCount = 0;
let incomeTimerId = null;
let incomeTimerStart = 0;
const INCOME_INTERVAL = 2000; // 2秒收入周期

// ==================== 初始化 ====================
function init() {
  blueBrain = new AIBrainV2("blue", "balanced");
  redBrain = new AIBrainV2("red", "aggressive");
  updateResourceDisplay();
  updateBaseDisplay();
  renderArmy([], "blueArmy");
  renderArmy([], "redArmy");
  document.getElementById("blueTitle").textContent = "🔵 " + getPersonalityName(blueBrain.personality);
  document.getElementById("redTitle").textContent = "🔴 " + getPersonalityName(redBrain.personality);
}

function updateSpeed() {
  gameSpeed = 851 - document.getElementById("speedSlider").value;
}

// ==================== 渲染函数 ====================

function renderArmy(units, containerId, animations = {}) {
  const container = document.getElementById(containerId);
  const living = units.filter(u => !u.dead);
  if (!living || living.length === 0) {
    container.innerHTML = '<p style="color:#555;text-align:center;padding:30px;font-size:0.85rem">等待部署...</p>';
    return;
  }

  container.innerHTML = living.map((u, i) => {
    const hpPct = u.hp / u.max_hp * 100;
    const hpColor = hpPct > 60 ? "#27ae60" : hpPct > 30 ? "#f39c12" : "#e74c3c";

    const animClass = animations[u.idx] || "";

    let skillsHtml = "";
    if (u.skills && u.skills.length > 0) {
      skillsHtml = `<div class="skill-indicators">
        ${u.skills.map(s => `<span class="skill-icon ${u.skillCooldowns[s] > 0 ? 'on-cooldown' : ''}">${SKILLS[s]?.icon || '?'}</span>`).join("")}
      </div>`;
    }

    let manaBar = "";
    if (u.maxMana > 0) {
      manaBar = `<div class="mana-bar"><div class="mana-fill" style="width:${u.mana/u.maxMana*100}%"></div></div>`;
    }

    const isNewUnit = u._newSpawn ? "new-unit" : "";
    if (u._newSpawn) u._newSpawn = false; // 只高亮一次

    return `
      <div class="unit-card ${animClass} ${isNewUnit}" id="unit-${u.owner}-${u.idx}">
        <div class="unit-icon">${u.icon}</div>
        <div class="unit-info">
          <div class="unit-name-row">
            <span class="unit-name">${u.name}</span>
            <span class="unit-tier tier-${u.tier}">T${u.tier}</span>
          </div>
          <div class="unit-types">${ATTACK_TYPES[u.attackType]?.name || u.attackType} → ${ARMOR_TYPES[u.armorType]?.name || u.armorType}</div>
          <div class="hp-container">
            <div class="hp-bar"><div class="hp-fill" style="width:${hpPct}%;background:${hpColor}"></div></div>
            <div class="hp-text">${u.hp}/${u.max_hp}</div>
            ${manaBar}
          </div>
          ${skillsHtml}
        </div>
        <div class="unit-stats">
          <div class="unit-dmg">⚔️${u.damage}</div>
          <div class="unit-armor">🛡️${u.effectiveArmor || u.armor}</div>
        </div>
      </div>
    `;
  }).join("");
}

function updateResourceDisplay() {
  if (blueBrain) {
    const s = blueBrain.resources.getState();
    document.getElementById("blueGold").textContent = s.gold;
    document.getElementById("blueLumber").textContent = s.lumber;
    document.getElementById("blueGoldIncome").textContent = s.goldPerTurn;
    document.getElementById("blueLumberIncome").textContent = s.lumberPerTurn;
    renderTechs("blueTechs", s.techs);
  }
  if (redBrain) {
    const s = redBrain.resources.getState();
    document.getElementById("redGold").textContent = s.gold;
    document.getElementById("redLumber").textContent = s.lumber;
    document.getElementById("redGoldIncome").textContent = s.goldPerTurn;
    document.getElementById("redLumberIncome").textContent = s.lumberPerTurn;
    renderTechs("redTechs", s.techs);
  }
}

function updateBaseDisplay() {
  if (blueBrain) {
    const b = blueBrain.base;
    const pct = b.hp / b.maxHp * 100;
    const fill = document.getElementById("blueBaseHpFill");
    fill.style.width = pct + "%";
    fill.className = "base-hp-fill " + (pct <= 30 ? "critical" : "blue-fill");
    document.getElementById("blueBaseHp").textContent = Math.max(0, b.hp);
  }
  if (redBrain) {
    const b = redBrain.base;
    const pct = b.hp / b.maxHp * 100;
    const fill = document.getElementById("redBaseHpFill");
    fill.style.width = pct + "%";
    fill.className = "base-hp-fill " + (pct <= 30 ? "critical" : "red-fill");
    document.getElementById("redBaseHp").textContent = Math.max(0, b.hp);
  }
}

function renderTechs(containerId, techs) {
  const container = document.getElementById(containerId);
  if (!techs || techs.length === 0) {
    container.innerHTML = '<span style="color:#555;font-size:0.75rem">无科技</span>';
    return;
  }
  const techList = Array.isArray(techs) ? techs : Array.from(techs);
  container.innerHTML = techList.map(t =>
    `<span class="tech-badge active">${TECHS[t]?.name || t}</span>`
  ).join("");
}

// ==================== 基地攻击逻辑 ====================
function attackBase(attackers, base, side) {
  let totalDmg = 0;
  const details = [];

  for (const unit of attackers) {
    if (unit.dead) continue;
    const mult = DAMAGE_TABLE[unit.attackType]?.fortified ?? 1.0;
    const armorReduction = base.armor * 0.06 / (1 + base.armor * 0.06);
    const dmg = Math.max(1, Math.round(unit.damage * mult * (1 - armorReduction)));
    totalDmg += dmg;
    details.push({ name: unit.name, icon: unit.icon, dmg, mult: mult.toFixed(1) });
  }

  base.hp -= totalDmg;
  if (base.hp < 0) base.hp = 0;

  return { totalDmg, details };
}

// ==================== 收入计时器（每2秒一次）====================
function startIncomeTimer() {
  incomeTimerStart = Date.now();
  incomeTimerId = setInterval(() => {
    if (!battleRunning) {
      clearInterval(incomeTimerId);
      incomeTimerId = null;
      return;
    }

    // 添加收入
    blueBrain.resources.addIncome();
    redBrain.resources.addIncome();

    const logContainer = document.getElementById("battleLog");
    const bs = blueBrain.resources.getState();
    const rs = redBrain.resources.getState();
    logContainer.innerHTML += `<div class="log-entry log-income">💰 收入周期！蓝方 +${bs.goldPerTurn}金+${bs.lumberPerTurn}木 | 红方 +${rs.goldPerTurn}金+${rs.lumberPerTurn}木</div>`;

    // AI决策
    const blueTurn = blueBrain.takeTurn(redBrain.army);
    const redTurn = redBrain.takeTurn(blueBrain.army);

    // 记录科技
    if (blueTurn.techResearched) {
      logContainer.innerHTML += `<div class="log-entry log-tech">🔵 研发: ${TECHS[blueTurn.techResearched]?.name}</div>`;
    }
    if (redTurn.techResearched) {
      logContainer.innerHTML += `<div class="log-entry log-tech">🔴 研发: ${TECHS[redTurn.techResearched]?.name}</div>`;
    }

    // 记录新单位
    if (blueTurn.unitsProduced.length > 0) {
      const names = blueTurn.unitsProduced.map(u => `${UNITS_V2[u]?.icon}${UNITS_V2[u]?.name}`).join(", ");
      logContainer.innerHTML += `<div class="log-entry log-spawn">🔵 出兵: ${names}</div>`;
      // 标记新单位
      blueBrain.army.forEach(u => { if (!u._marked) { u._newSpawn = true; u._marked = true; }});
    }
    if (redTurn.unitsProduced.length > 0) {
      const names = redTurn.unitsProduced.map(u => `${UNITS_V2[u]?.icon}${UNITS_V2[u]?.name}`).join(", ");
      logContainer.innerHTML += `<div class="log-entry log-spawn">🔴 出兵: ${names}</div>`;
      redBrain.army.forEach(u => { if (!u._marked) { u._newSpawn = true; u._marked = true; }});
    }

    // 清理日志
    const entries = logContainer.querySelectorAll('.log-entry, .log-round');
    if (entries.length > 100) {
      for (let i = 0; i < entries.length - 100; i++) entries[i].remove();
    }
    logContainer.scrollTop = logContainer.scrollHeight;

    // 更新UI
    updateResourceDisplay();
    renderArmy(blueBrain.army, "blueArmy");
    renderArmy(redBrain.army, "redArmy");

    // 重置计时器
    incomeTimerStart = Date.now();
  }, INCOME_INTERVAL);
}

function stopIncomeTimer() {
  if (incomeTimerId) {
    clearInterval(incomeTimerId);
    incomeTimerId = null;
  }
}

// 更新计时器UI
function updateTimerUI() {
  if (!battleRunning || !incomeTimerStart) {
    document.getElementById("timerFill").style.width = "0%";
    document.getElementById("timerText").textContent = "2秒";
    return;
  }
  const elapsed = Date.now() - incomeTimerStart;
  const pct = Math.min(100, elapsed / INCOME_INTERVAL * 100);
  const remaining = Math.max(0, Math.ceil((INCOME_INTERVAL - elapsed) / 1000));
  document.getElementById("timerFill").style.width = pct + "%";
  document.getElementById("timerText").textContent = remaining + "秒";
}

// ==================== 战斗系统 ====================
async function startBattle() {
  if (battleRunning) return;
  battleRunning = true;

  // 禁用按钮
  document.getElementById("btnBattle").disabled = true;

  // 重置
  roundNum = 0;
  actionCount = 0;
  blueBrain = new AIBrainV2("blue", "balanced");
  redBrain = new AIBrainV2("red", "aggressive");

  updateResourceDisplay();
  updateBaseDisplay();
  renderArmy([], "blueArmy");
  renderArmy([], "redArmy");
  document.getElementById("blueTitle").textContent = "🔵 " + getPersonalityName(blueBrain.personality);
  document.getElementById("redTitle").textContent = "🔴 " + getPersonalityName(redBrain.personality);
  document.getElementById("battleLog").innerHTML = "<div style='color:#f39c12;text-align:center;padding:10px'>⚔️ 基地攻防战开始！摧毁对方基地获胜！</div>";
  document.getElementById("resultBanner").style.display = "none";

  await sleep(300);

  // 第一次收入+AI决策（立即执行，让双方有初始兵力）
  blueBrain.resources.addIncome();
  redBrain.resources.addIncome();
  blueBrain.takeTurn(null);
  redBrain.takeTurn(blueBrain.army);

  // 标记所有初始单位
  blueBrain.army.forEach(u => { u._newSpawn = true; u._marked = true; });
  redBrain.army.forEach(u => { u._newSpawn = true; u._marked = true; });

  updateResourceDisplay();
  renderArmy(blueBrain.army, "blueArmy");
  renderArmy(redBrain.army, "redArmy");

  await sleep(500);

  // 启动收入计时器
  startIncomeTimer();

  // 战斗循环
  while (battleRunning) {
    roundNum++;
    document.getElementById("roundNum").textContent = roundNum;

    // 执行战斗回合
    await executeRound();

    // 更新基地攻击
    const blueAlive = blueBrain.army.filter(u => !u.dead).length;
    const redAlive = redBrain.army.filter(u => !u.dead).length;

    // 如果一方没有存活单位，另一方攻击基地
    const logContainer = document.getElementById("battleLog");

    if (redAlive === 0 && blueAlive > 0) {
      const result = attackBase(blueBrain.army, redBrain.base, "red");
      if (result.totalDmg > 0) {
        logContainer.innerHTML += `<div class="log-entry log-base">🏰 蓝方部队攻击红方基地！造成 ${result.totalDmg} 伤害 (红方基地: ${redBrain.base.hp}/${redBrain.base.maxHp})</div>`;
        showBaseDamage("red", result.totalDmg);
      }
      updateBaseDisplay();
    }
    if (blueAlive === 0 && redAlive > 0) {
      const result = attackBase(redBrain.army, blueBrain.base, "blue");
      if (result.totalDmg > 0) {
        logContainer.innerHTML += `<div class="log-entry log-base">🏰 红方部队攻击蓝方基地！造成 ${result.totalDmg} 伤害 (蓝方基地: ${blueBrain.base.hp}/${blueBrain.base.maxHp})</div>`;
        showBaseDamage("blue", result.totalDmg);
      }
      updateBaseDisplay();
    }

    // 更新统计
    document.getElementById("blueAlive").textContent = blueAlive;
    document.getElementById("redAlive").textContent = redAlive;
    document.getElementById("actionCount").textContent = actionCount;

    // 检查胜利条件：基地被摧毁
    if (blueBrain.base.hp <= 0 || redBrain.base.hp <= 0) {
      battleRunning = false;
      stopIncomeTimer();
      const winner = blueBrain.base.hp <= 0 ? "红方" : "蓝方";
      const cls = blueBrain.base.hp <= 0 ? "result-red" : "result-blue";
      showBanner(`🏆 ${winner} 摧毁敌方基地，获胜！`, cls);
      logContainer.innerHTML += `<div style='color:#f39c12;font-weight:bold;margin-top:10px'>🏰 ${winner} 获胜！敌方基地已被摧毁！</div>`;
      document.getElementById("btnBattle").disabled = false;
      break;
    }

    // 无时间限制，仅基地被摧毁时结束

    updateTimerUI();
    await sleep(gameSpeed);
  }
}

async function executeRound() {
  const blueLiving = blueBrain.army.filter(u => !u.dead);
  const redLiving = redBrain.army.filter(u => !u.dead);
  const allUnits = [...blueLiving, ...redLiving]
    .sort((a, b) => (b.effectiveSpeed || b.speed) - (a.effectiveSpeed || a.speed));

  const logContainer = document.getElementById("battleLog");
  let roundLog = `<div class="log-round">--- 第 ${roundNum} 回合 (蓝${blueLiving.length} vs 红${redLiving.length}) ---</div>`;

  for (const unit of allUnits) {
    if (unit.dead || !battleRunning) continue;

    const enemies = unit.owner === "blue" ? redBrain.army : blueBrain.army;
    const allies = unit.owner === "blue" ? blueBrain.army : redBrain.army;
    const techs = (unit.owner === "blue" ? blueBrain : redBrain).resources.techs;

    const actions = unit.act(enemies, allies, techs);
    if (!actions) continue;

    const animations = {};

    for (const action of actions) {
      actionCount++;

      if (action.type === "skill") {
        animations[unit.idx] = "skill-active";
        roundLog += `<div class="log-entry log-skill">${unit.icon} ${unit.name} 使用 ${action.icon} ${action.skillName}！</div>`;
      } else if (action.type === "attack") {
        animations[unit.idx] = "attacking";
        if (action.target) animations[action.target.idx] = "hit";

        let logClass = unit.owner === "blue" ? "log-blue" : "log-red";
        let logText = `${unit.icon} ${unit.name} → ${action.target.icon} ${action.target.name}`;

        if (action.evaded) {
          logText += ` 💨闪避！`;
          roundLog += `<div class="log-entry ${logClass} log-evade">${logText}</div>`;
          showDamageNumber(action.target, "闪避", "evade");
        } else {
          logText += ` ${action.damage} 伤害`;
          if (action.crit) {
            logText = `${unit.icon} ${unit.name} ⚡暴击！→ ${action.target.icon} ${action.target.name} ${action.damage} 伤害`;
            logClass += " log-crit";
            showDamageNumber(action.target, action.damage, "crit");
          } else {
            showDamageNumber(action.target, action.damage, "damage");
          }

          if (action.healed) {
            logText += ` 🩸+${action.healed}`;
            showDamageNumber(unit, `+${action.healed}`, "heal");
          }

          if (action.killed) {
            logText += ` 💀击杀`;
            logClass += " log-kill";
          }

          roundLog += `<div class="log-entry ${logClass}">${logText}</div>`;
        }
      }
    }

    // 更新渲染
    renderArmy(blueBrain.army, "blueArmy", animations);
    renderArmy(redBrain.army, "redArmy", animations);
    await sleep(Math.min(gameSpeed / 3, 100));
  }

  logContainer.innerHTML += roundLog;
  // 日志上限100条
  const entries = logContainer.querySelectorAll('.log-entry, .log-round');
  if (entries.length > 100) {
    for (let i = 0; i < entries.length - 100; i++) entries[i].remove();
  }
  logContainer.scrollTop = logContainer.scrollHeight;
}

function showDamageNumber(unit, text, type) {
  const layer = document.getElementById("animationLayer");
  const card = document.getElementById(`unit-${unit.owner}-${unit.idx}`);
  if (!card) return;

  const rect = card.getBoundingClientRect();
  const div = document.createElement("div");
  div.className = `damage-number ${type}`;
  div.textContent = text;
  div.style.left = rect.left + rect.width / 2 + "px";
  div.style.top = rect.top + "px";

  layer.appendChild(div);
  setTimeout(() => div.remove(), 1000);
}

function showBaseDamage(side, totalDmg) {
  const layer = document.getElementById("animationLayer");
  const panel = document.querySelector(`.base-panel.${side}`);
  if (!panel) return;

  const rect = panel.getBoundingClientRect();
  const div = document.createElement("div");
  div.className = "damage-number base-damage";
  div.textContent = `-${totalDmg}`;
  div.style.left = rect.left + rect.width / 2 + "px";
  div.style.top = rect.top + 10 + "px";

  layer.appendChild(div);
  setTimeout(() => div.remove(), 1200);
}

// ==================== 锦标赛模式 ====================
async function startTournament() {
  if (battleRunning) return;
  battleRunning = true;

  const personalities = ["balanced", "aggressive", "defensive", "economic"];
  const results = {};
  personalities.forEach(p => results[p] = { wins: 0, losses: 0 });

  const logEl = document.getElementById("battleLog");
  logEl.innerHTML = "<div style='color:#f39c12;text-align:center;padding:15px'>🏆 锦标赛开始！四种AI策略基地攻防两两对决...</div>";

  for (let i = 0; i < personalities.length; i++) {
    for (let j = i + 1; j < personalities.length; j++) {
      const p1 = personalities[i];
      const p2 = personalities[j];

      logEl.innerHTML += `<div style='color:#888;padding:6px 0;border-top:1px solid rgba(255,255,255,0.1)'>⚔️ ${getPersonalityName(p1)} vs ${getPersonalityName(p2)}</div>`;

      const brain1 = new AIBrainV2("blue", p1);
      const brain2 = new AIBrainV2("red", p2);

      // 快速模拟基地攻防战
      for (let cycle = 0; cycle < 40; cycle++) {
        // 收入
        brain1.resources.addIncome();
        brain2.resources.addIncome();

        // AI决策
        brain1.takeTurn(brain2.army);
        brain2.takeTurn(brain1.army);

        // 战斗回合
        const all = [...brain1.army.filter(u => !u.dead), ...brain2.army.filter(u => !u.dead)]
          .sort((a, b) => b.speed - a.speed);

        for (const u of all) {
          if (u.dead) continue;
          const enemies = u.owner === "blue" ? brain2.army : brain1.army;
          u.act(enemies, [], []);
        }

        // 基地攻击
        const alive1 = brain1.army.filter(u => !u.dead).length;
        const alive2 = brain2.army.filter(u => !u.dead).length;

        if (alive2 === 0 && alive1 > 0) {
          attackBase(brain1.army, brain2.base, "red");
        }
        if (alive1 === 0 && alive2 > 0) {
          attackBase(brain2.army, brain1.base, "blue");
        }

        // 检查胜利
        if (brain1.base.hp <= 0 || brain2.base.hp <= 0) break;
      }

      if (brain1.base.hp <= 0) {
        results[p2].wins++;
        results[p1].losses++;
        logEl.innerHTML += `<div style='color:#e74c3c'>🏆 ${getPersonalityName(p2)} 摧毁基地获胜！</div>`;
      } else if (brain2.base.hp <= 0) {
        results[p1].wins++;
        results[p2].losses++;
        logEl.innerHTML += `<div style='color:#27ae60'>🏆 ${getPersonalityName(p1)} 摧毁基地获胜！</div>`;
      } else {
        // 比较基地血量
        if (brain1.base.hp > brain2.base.hp) {
          results[p1].wins++;
          results[p2].losses++;
          logEl.innerHTML += `<div style='color:#27ae60'>🏆 ${getPersonalityName(p1)} 获胜 (基地${brain1.base.hp} vs ${brain2.base.hp})</div>`;
        } else if (brain2.base.hp > brain1.base.hp) {
          results[p2].wins++;
          results[p1].losses++;
          logEl.innerHTML += `<div style='color:#e74c3c'>🏆 ${getPersonalityName(p2)} 获胜 (基地${brain2.base.hp} vs ${brain1.base.hp})</div>`;
        } else {
          logEl.innerHTML += `<div style='color:#888'>⚖️ 平局</div>`;
        }
      }

      await sleep(300);
    }
  }

  // 排名
  const sorted = Object.entries(results).sort((a, b) => b[1].wins - a[1].wins);
  logEl.innerHTML += `<div style='color:#f39c12;font-weight:bold;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.2)'>🏆 最终排名</div>`;
  sorted.forEach(([p, r], i) => {
    logEl.innerHTML += `<div>${i + 1}. ${getPersonalityName(p)}: ${r.wins}胜 ${r.losses}负</div>`;
  });

  battleRunning = false;
}

// ==================== 辅助函数 ====================
function getPersonalityName(p) {
  const names = {
    balanced: "均衡AI",
    aggressive: "激进AI",
    defensive: "防守AI",
    economic: "经济AI"
  };
  return names[p] || p;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function showBanner(text, cls) {
  const b = document.getElementById("resultBanner");
  b.textContent = text;
  b.className = `result-banner ${cls}`;
  b.style.display = "block";
}

// ==================== 弹窗 ====================
function showCounterModal() {
  const modal = document.getElementById("counterModal");
  const content = document.getElementById("counterTableContent");

  let html = `<table class="counter-table">
    <tr><th>攻击类型</th><th>护甲类型</th><th>伤害倍率</th></tr>`;

  for (const [atk, defs] of Object.entries(DAMAGE_TABLE)) {
    for (const [def, mult] of Object.entries(defs)) {
      const cls = mult > 1 ? "positive" : mult < 1 ? "negative" : "neutral";
      html += `<tr>
        <td>${ATTACK_TYPES[atk]?.icon || ""} ${ATTACK_TYPES[atk]?.name || atk}</td>
        <td>${ARMOR_TYPES[def]?.name || def}</td>
        <td class="${cls}">${mult}x</td>
      </tr>`;
    }
  }

  html += "</table>";
  content.innerHTML = html;
  modal.style.display = "flex";
}

function closeCounterModal() {
  document.getElementById("counterModal").style.display = "none";
}

function showTechTree() {
  const modal = document.getElementById("techModal");
  const content = document.getElementById("techTreeContent");

  let html = "<div style='line-height:2'>";
  for (const [id, tech] of Object.entries(TECHS)) {
    const tierColors = ["#95a5a6", "#3498db", "#f39c12"];
    html += `<div style='margin:8px 0;padding:8px;background:rgba(255,255,255,0.05);border-radius:8px;border-left:3px solid ${tierColors[tech.tier - 1]}'>`;
    html += `<div style='font-weight:bold;color:${tierColors[tech.tier - 1]}'>${tech.name} (T${tech.tier})</div>`;
    html += `<div style='font-size:0.85rem;color:#888'>💰 ${tech.cost} | ${tech.effect}</div>`;
    if (tech.requires) {
      html += `<div style='font-size:0.75rem;color:#9b59b6'>前置: ${tech.requires.map(r => TECHS[r]?.name || r).join(", ")}</div>`;
    }
    html += "</div>";
  }
  html += "</div>";

  content.innerHTML = html;
  modal.style.display = "flex";
}

function closeTechModal() {
  document.getElementById("techModal").style.display = "none";
}

// 点击背景关闭弹窗
document.querySelectorAll(".modal-overlay").forEach(m => {
  m.addEventListener("click", e => {
    if (e.target === m) m.style.display = "none";
  });
});

// 初始化
init();
</script>
