<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>魔兽兵种对战 v3.0 - Canvas 2D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #fff;
    }
    
    .game-container {
      display: grid;
      grid-template-columns: 280px 1fr 280px;
      gap: 10px;
      padding: 10px;
      height: 100vh;
    }
    
    .panel {
      background: rgba(0,0,0,0.6);
      border-radius: 12px;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .panel-title {
      font-size: 1.1rem;
      font-weight: bold;
      padding-bottom: 8px;
      border-bottom: 2px solid #3498db;
      margin-bottom: 5px;
    }
    
    .battlefield-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .battlefield-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background: rgba(0,0,0,0.6);
      border-radius: 12px;
    }
    
    .battlefield-canvas {
      flex: 1;
      background: rgba(0,0,0,0.4);
      border-radius: 12px;
      position: relative;
      overflow: hidden;
      min-height: 350px;
    }
    
    #battleCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    
    .resource-bar {
      display: flex;
      gap: 15px;
      padding: 10px;
      background: rgba(0,0,0,0.5);
      border-radius: 8px;
    }
    
    .resource { display: flex; align-items: center; gap: 5px; }
    .resource-icon { font-size: 1.2rem; }
    .resource-value { font-weight: bold; color: #f1c40f; }
    
    .unit-card {
      background: linear-gradient(135deg, rgba(52,152,219,0.3), rgba(41,128,185,0.2));
      border: 1px solid rgba(52,152,219,0.5);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
      transition: all 0.3s ease;
    }
    .unit-card:hover { transform: translateX(5px); border-color: #3498db; }
    .unit-card.enemy {
      background: linear-gradient(135deg, rgba(231,76,60,0.3), rgba(192,57,43,0.2));
      border-color: rgba(231,76,60,0.5);
    }
    
    .unit-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .unit-icon { font-size: 1.5rem; }
    .unit-name { font-weight: bold; }
    
    .hp-bar { height: 6px; background: #333; border-radius: 3px; overflow: hidden; margin-top: 5px; }
    .hp-fill { height: 100%; background: linear-gradient(90deg, #27ae60, #2ecc71); transition: width 0.3s; }
    .hp-fill.low { background: linear-gradient(90deg, #e74c3c, #c0392b); }
    .hp-fill.mid { background: linear-gradient(90deg, #f39c12, #e67e22); }
    
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
      transition: all 0.3s;
    }
    .btn-primary { background: linear-gradient(135deg, #3498db, #2980b9); color: white; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(52,152,219,0.4); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .battle-log {
      flex: 1;
      overflow-y: auto;
      font-size: 0.85rem;
      padding: 10px;
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
    }
    .log-entry { padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.1); animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    
    .skill-icon {
      display: inline-block;
      padding: 3px 6px;
      background: rgba(155,89,182,0.5);
      border-radius: 4px;
      margin-right: 3px;
      font-size: 0.9rem;
    }
    
    .round-indicator { font-size: 1.5rem; font-weight: bold; color: #f1c40f; }
    
    .base-hp { display: flex; align-items: center; gap: 10px; }
    .base-bar { flex: 1; height: 20px; background: #333; border-radius: 10px; overflow: hidden; }
    .base-fill { height: 100%; transition: width 0.5s; }
    .base-fill.blue { background: linear-gradient(90deg, #3498db, #2980b9); }
    .base-fill.red { background: linear-gradient(90deg, #e74c3c, #c0392b); }
    
    .status-msg { text-align: center; padding: 20px; color: #888; }
    
    .army-list { max-height: 300px; overflow-y: auto; }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="panel">
      <div class="panel-title">🔵 蓝方基地</div>
      <div class="base-hp">
        <span>🏰</span>
        <div class="base-bar"><div class="base-fill blue" id="blueBaseFill" style="width: 100%"></div></div>
        <span id="blueBaseHp">3000</span>
      </div>
      <div class="resource-bar">
        <div class="resource"><span class="resource-icon">💰</span><span class="resource-value" id="blueGold">500</span></div>
        <div class="resource"><span class="resource-icon">🪵</span><span class="resource-value" id="blueLumber">500</span></div>
      </div>
      <div class="panel-title" style="margin-top:10px">军队</div>
      <div id="blueArmy" class="army-list"><div class="status-msg">等待部署...</div></div>
    </div>
    
    <div class="battlefield-container">
      <div class="battlefield-header">
        <div>回合: <span class="round-indicator" id="roundNum">0</span></div>
        <button class="btn btn-primary" id="btnBattle" onclick="startBattle()">⚔️ 开始对战</button>
        <div>速度: <input type="range" id="speedSlider" min="100" max="800" value="500" onchange="updateSpeed()" style="width:100px"></div>
      </div>
      <div class="battlefield-canvas">
        <canvas id="battleCanvas"></canvas>
      </div>
      <div class="battlefield-header">
        <div class="base-hp" style="flex:1">
          <span>🔴 红方基地</span>
          <div class="base-bar"><div class="base-fill red" id="redBaseFill" style="width: 100%"></div></div>
          <span id="redBaseHp">3000</span>
        </div>
      </div>
    </div>
    
    <div class="panel">
      <div class="panel-title">🔴 红方军队</div>
      <div id="redArmy" class="army-list"><div class="status-msg">等待部署...</div></div>
      <div class="panel-title" style="margin-top:10px">📜 战斗日志</div>
      <div class="battle-log" id="battleLog"><div class="status-msg">等待开始...</div></div>
    </div>
  </div>

  <script src="war3_data_v2.js"></script>
  <script src="war3_expansion.js"></script>
  
  <script>
    // ==================== Canvas 2D 渲染引擎 ====================
    let battleCanvas, battleCtx;
    const unitPositions = new Map();
    
    function initEngine() {
      battleCanvas = document.getElementById('battleCanvas');
      if (!battleCanvas) { console.error('找不到 canvas'); return false; }
      battleCtx = battleCanvas.getContext('2d');
      
      function resize() {
        const rect = battleCanvas.parentElement.getBoundingClientRect();
        battleCanvas.width = rect.width;
        battleCanvas.height = Math.max(300, rect.height);
        drawBackground();
      }
      window.addEventListener('resize', resize);
      resize();
      return true;
    }
    
    function drawBackground() {
      const ctx = battleCtx, w = battleCanvas.width, h = battleCanvas.height;
      if (!ctx) return;
      
      ctx.fillStyle = '#0a0a1a';
      ctx.fillRect(0, 0, w, h);
      
      ctx.strokeStyle = 'rgba(52,152,219,0.1)';
      ctx.lineWidth = 1;
      for (let x = 0; x <= w; x += 50) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
      }
      for (let y = 0; y <= h; y += 50) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
      }
      
      ctx.strokeStyle = 'rgba(241,196,15,0.3)';
      ctx.lineWidth = 2;
      ctx.setLineDash([10, 5]);
      ctx.beginPath(); ctx.moveTo(w/2, 0); ctx.lineTo(w/2, h); ctx.stroke();
      ctx.setLineDash([]);
    }
    
    function drawUnit(unit, x, y, isBlue) {
      const ctx = battleCtx;
      const color = isBlue ? '#3498db' : '#e74c3c';
      
      // 底座圆
      ctx.beginPath();
      ctx.arc(x, y, 30, 0, Math.PI * 2);
      ctx.fillStyle = color + '80';
      ctx.fill();
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.stroke();
      
      // 图标
      ctx.font = '24px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(unit.icon || '?', x, y);
      
      // 血条背景
      ctx.fillStyle = '#333';
      ctx.fillRect(x - 40, y - 45, 80, 8);
      
      // 血条
      const hpPct = Math.max(0, unit.hp / unit.max_hp);
      ctx.fillStyle = hpPct > 0.6 ? '#27ae60' : hpPct > 0.3 ? '#f39c12' : '#e74c3c';
      ctx.fillRect(x - 40, y - 45, 80 * hpPct, 8);
      
      // 英雄光环
      if (unit.isHero) {
        ctx.beginPath();
        ctx.arc(x, y, 35, 0, Math.PI * 2);
        ctx.strokeStyle = '#f1c40f';
        ctx.lineWidth = 3;
        ctx.setLineDash([5, 3]);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    }
    
    function renderBattlefield() {
      if (!battleCtx) return;
      const w = battleCanvas.width;
      
      drawBackground();
      unitPositions.clear();
      
      if (blueBrain) {
        blueBrain.army.filter(u => !u.dead).forEach((u, i) => {
          const x = 100 + (i % 4) * 85;
          const y = 80 + Math.floor(i / 4) * 95;
          drawUnit(u, x, y, true);
          unitPositions.set(u.idx, { x, y, isBlue: true });
        });
      }
      
      if (redBrain) {
        redBrain.army.filter(u => !u.dead).forEach((u, i) => {
          const x = w - 130 - (i % 4) * 85;
          const y = 80 + Math.floor(i / 4) * 95;
          drawUnit(u, x, y, false);
          unitPositions.set(u.idx, { x, y, isBlue: false });
        });
      }
    }
    
    // ==================== 游戏状态 ====================
    let battleRunning = false;
    let roundNum = 0;
    let gameSpeed = 400;
    let blueBrain, redBrain;
    
    const BLUE_HERO_TYPE = "strength_hero";
    const RED_HERO_TYPE = "agility_hero";
    
    // ==================== 工具函数 ====================
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    
    function log(msg, color = '#fff') {
      const el = document.getElementById('battleLog');
      el.innerHTML += `<div class="log-entry" style="color:${color}">${msg}</div>`;
      el.scrollTop = el.scrollHeight;
    }
    
    function updateSpeed() {
      gameSpeed = 901 - document.getElementById('speedSlider').value;
    }
    
    // ==================== UI ====================
    function renderArmyPanel(units, containerId, isBlue) {
      const container = document.getElementById(containerId);
      const living = units.filter(u => !u.dead);
      
      if (living.length === 0) {
        container.innerHTML = '<div class="status-msg">等待部署...</div>';
        return;
      }
      
      container.innerHTML = living.map(u => {
        const hpPct = u.hp / u.max_hp * 100;
        const hpClass = hpPct > 60 ? '' : hpPct > 30 ? 'mid' : 'low';
        const skillsHtml = (u.skills || []).map(s => 
          `<span class="skill-icon">${(SKILLS[s] || {}).icon || '?'}</span>`
        ).join('');
        
        return `<div class="unit-card ${isBlue ? '' : 'enemy'}">
          <div class="unit-header">
            <span class="unit-icon">${u.icon}</span>
            <span class="unit-name">${u.name}</span>
            <span style="font-size:0.8rem;color:#888">${Math.ceil(u.hp)}/${u.max_hp}</span>
          </div>
          <div class="hp-bar"><div class="hp-fill ${hpClass}" style="width:${hpPct}%"></div></div>
          ${skillsHtml ? `<div style="margin-top:5px">${skillsHtml}</div>` : ''}
        </div>`;
      }).join('');
    }
    
    function updateUI() {
      if (blueBrain) {
        const bs = blueBrain.resources.getState();
        document.getElementById('blueGold').textContent = bs.gold;
        document.getElementById('blueLumber').textContent = bs.lumber;
        document.getElementById('blueBaseHp').textContent = Math.ceil(blueBrain.base.hp);
        document.getElementById('blueBaseFill').style.width = (blueBrain.base.hp / blueBrain.base.maxHp * 100) + '%';
        renderArmyPanel(blueBrain.army, 'blueArmy', true);
      }
      if (redBrain) {
        document.getElementById('redBaseHp').textContent = Math.ceil(redBrain.base.hp);
        document.getElementById('redBaseFill').style.width = (redBrain.base.hp / redBrain.base.maxHp * 100) + '%';
        renderArmyPanel(redBrain.army, 'redArmy', false);
      }
    }
    
    // ==================== 战斗系统 ====================
    async function startBattle() {
      if (battleRunning) return;
      
      const btn = document.getElementById('btnBattle');
      btn.disabled = true;
      
      // 等待 Canvas 初始化
      let wait = 0;
      while (!window.engineReady && wait < 50) {
        document.getElementById('battleLog').innerHTML = '<div class="status-msg">⏳ 初始化中...</div>';
        await sleep(100);
        wait++;
      }
      
      if (!window.engineReady) {
        document.getElementById('battleLog').innerHTML = '<div class="status-msg" style="color:#e74c3c">❌ 引擎初始化失败</div>';
        btn.disabled = false;
        return;
      }
      
      battleRunning = true;
      document.getElementById('battleLog').innerHTML = '';
      log('⚔️ 战斗开始！', '#f39c12');
      
      // 初始化 AI
      blueBrain = new AIBrainV2("blue", "balanced", BLUE_HERO_TYPE);
      redBrain = new AIBrainV2("red", "aggressive", RED_HERO_TYPE);
      
      // 第一回合
      blueBrain.resources.addIncome();
      redBrain.resources.addIncome();
      
      const blueTurn = blueBrain.takeTurn(null);
      const redTurn = redBrain.takeTurn(blueBrain.army);
      
      console.log('蓝方:', blueTurn);
      console.log('红方:', redTurn);
      
      if (blueTurn && blueTurn.heroSpawned) {
        log(`🔵 蓝方英雄 ${(HEROES[blueTurn.heroSpawned] || {}).name || blueTurn.heroSpawned} 出场！`, '#3498db');
      }
      if (redTurn && redTurn.heroSpawned) {
        log(`🔴 红方英雄 ${(HEROES[redTurn.heroSpawned] || {}).name || redTurn.heroSpawned} 出场！`, '#e74c3c');
      }
      
      if (blueTurn && blueTurn.unitsProduced && blueTurn.unitsProduced.length > 0) {
        log(`🔵 蓝方: ${blueTurn.unitsProduced.map(u => (UNITS_V2[u] || {}).name || u).join(', ')}`, '#3498db');
      }
      if (redTurn && redTurn.unitsProduced && redTurn.unitsProduced.length > 0) {
        log(`🔴 红方: ${redTurn.unitsProduced.map(u => (UNITS_V2[u] || {}).name || u).join(', ')}`, '#e74c3c');
      }
      
      updateUI();
      renderBattlefield();
      await sleep(500);
      
      // 战斗循环
      while (battleRunning) {
        roundNum++;
        document.getElementById('roundNum').textContent = roundNum;
        
        await executeRound();
        
        if (blueBrain.base.hp <= 0 || redBrain.base.hp <= 0) {
          battleRunning = false;
          const winner = blueBrain.base.hp <= 0 ? '🔴 红方' : '🔵 蓝方';
          log(`🏆 ${winner} 获胜！`, '#f1c40f');
          btn.disabled = false;
          break;
        }
        
        blueBrain.resources.addIncome();
        redBrain.resources.addIncome();
        
        const bt = blueBrain.takeTurn(redBrain.army);
        const rt = redBrain.takeTurn(blueBrain.army);
        
        if (bt && bt.heroRevived) log(`🔵 蓝方英雄复活！`, '#3498db');
        if (rt && rt.heroRevived) log(`🔴 红方英雄复活！`, '#e74c3c');
        
        if (bt && bt.unitsProduced && bt.unitsProduced.length > 0) {
          log(`🔵 蓝方: ${bt.unitsProduced.map(u => (UNITS_V2[u] || {}).name || u).join(', ')}`, '#3498db');
        }
        if (rt && rt.unitsProduced && rt.unitsProduced.length > 0) {
          log(`🔴 红方: ${rt.unitsProduced.map(u => (UNITS_V2[u] || {}).name || u).join(', ')}`, '#e74c3c');
        }
        
        updateUI();
        renderBattlefield();
        await sleep(gameSpeed);
      }
    }
    
    async function executeRound() {
      const allUnits = [...blueBrain.army.filter(u => !u.dead), ...redBrain.army.filter(u => !u.dead)]
        .sort((a, b) => b.speed - a.speed);
      
      log(`── 回合 ${roundNum} ──`, '#888');
      
      for (const unit of allUnits) {
        if (unit.dead || !battleRunning) continue;
        
        const enemies = unit.owner === 'blue' ? redBrain.army : blueBrain.army;
        const allies = unit.owner === 'blue' ? blueBrain.army : redBrain.army;
        const techs = (unit.owner === 'blue' ? blueBrain : redBrain).resources.techs;
        
        try {
          const actions = unit.act(enemies, allies, techs);
          if (!actions) continue;
          
          for (const action of actions) {
            if (action.type === 'attack' && action.target) {
              const color = unit.owner === 'blue' ? '#3498db' : '#e74c3c';
              const critText = action.crit ? '💥暴击!' : '';
              log(`${unit.icon} ${unit.name} → ${action.target.icon} ${action.target.name} ${action.damage}伤害 ${critText}`, color);
            }
          }
        } catch (e) {
          console.error('执行行动失败:', unit.name, e);
        }
      }
      
      renderBattlefield();
    }
    
    // 启动引擎
    window.addEventListener('load', () => {
      setTimeout(() => {
        window.engineReady = initEngine();
        if (window.engineReady) renderBattlefield();
      }, 100);
    });
  </script>
</body>
</html>
